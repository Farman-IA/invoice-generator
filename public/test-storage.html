<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Test Storage</title></head>
<body><pre id="o">Test en cours...</pre>
<script>
try {
  // Ecrire
  localStorage.setItem('_test_persist', 'OK_' + Date.now());
  const written = localStorage.getItem('_test_persist');

  // Lire toutes les clés existantes
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    const val = localStorage.getItem(key);
    keys.push(key + ' (' + (val ? val.length : 0) + ' chars)');
  }

  document.getElementById('o').textContent =
    'URL: ' + location.origin +
    '\nEcriture test: ' + written +
    '\nNb cles localStorage: ' + localStorage.length +
    '\nCles: ' + keys.join(', ');
} catch(e) {
  document.getElementById('o').textContent = 'ERREUR: ' + e.message;
}
</script></body></html>
