<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Check</title></head>
<body><pre id="o">...</pre>
<script>
const counter = localStorage.getItem('invoice-counter');
const invoices = JSON.parse(localStorage.getItem('invoices') || '[]');
const numbers = invoices.map(i => i.invoice.number);
document.getElementById('o').textContent =
  'Compteur actuel: ' + counter +
  '\nProchaine facture sera: FAC-2026-' + String(JSON.parse(counter || '1') + 1).padStart(3, '0') +
  '\nNuméros existants: ' + numbers.join(', ');
</script></body></html>
